name: Release

# Publishes to crates.io when you push a version tag, e.g. `v0.1.1`.
# Flow: bump `version` in Cargo.toml -> commit -> `git tag v0.1.1` -> `git push --tags`.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-releases like v0.2.0-rc.1

jobs:
  publish:
    runs-on: ubuntu-latest
    # An `environment` lets you add required reviewers / protection rules in the
    # repo settings, and is referenced when you configure the Trusted Publisher.
    environment: release
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Fail fast if someone tags a version that doesn't match Cargo.toml.
      - name: Verify tag matches Cargo.toml version
        run: |
          cargo_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml: $cargo_version | tag: $tag_version"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::Tag v$tag_version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi

      - name: Test
        run: cargo test --all-features

      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
